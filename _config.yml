title: ERCAS 2026
description: >-
  Escola Regional de Computação Aplicada à Saúde (ERCAS) — evento anual que
  reúne pesquisadores, profissionais e estudantes das áreas de informática
  em saúde, sistemas de informação hospitalar e tecnologias aplicadas à saúde.
url: "https://atyimolab.github.io"
# baseurl is set per-language config

theme: jekyll-theme-conference
plugins:
  - jekyll-feed
  - jekyll-include-cache

collections:
  talks:
    output: true
  speakers:
    output: true
  rooms:
    output: true

defaults:
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
  - scope:
      path: ""
      type: speakers
    values:
      layout: speaker
  - scope:
      path: ""
      type: rooms
    values:
      layout: room

include:
  - .htaccess

exclude:
  - GUIDE.md
  - README.md

conference:
  name: "ERCAS"
  year: "2026"
  tz: "-03:00"
  show_errors: true   # set false in production build

  event:
    dates: "13–15 de outubro de 2026"
    city: "Salvador, BA"
    venue: "Universidade Federal da Bahia (UFBA)"
    registration_url: "https://ercas2026.ufba.br/inscricoes"

  social:
    email: "contato@ercas2026.ufba.br"
    instagram: "ercas2026"

  talks:
    tracks:
      - name: Pesquisa
        color: info
      - name: Indústria
        color: success
      - name: Educação
        color: warning
    tags:
      - name: Keynote
        icon: star
      - name: Tutorial
        icon: mortarboard
